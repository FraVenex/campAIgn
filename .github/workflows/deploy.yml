name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular application
        run: |
          npm run build -- --base-href /campAIgn/ || {
            npm run build -- --base-href /campAIgn/ > build_error.txt 2>&1
            ERROR_LOG=$(cat build_error.txt | tr '\n' '%' | sed 's/%/%0A/g')
            echo "::error::$ERROR_LOG"
            exit 1
          }

      - name: Copy index to 404
        run: cp dist/camp-aign-frontend/browser/index.html dist/camp-aign-frontend/browser/404.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/camp-aign-frontend/browser
          branch: gh-pages
